<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 05 연습 문제 - DOM, 이벤트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .exercise {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .exercise h2 {
            color: #3498db;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
        }

        /* ===== 문제 1: 카운터 ===== */
        #counter-display {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: #2c3e50;
        }

        .counter-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .counter-buttons button {
            font-size: 18px;
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }

        #btn-decrease {
            background-color: #e74c3c;
        }

        #btn-reset {
            background-color: #95a5a6;
        }

        #btn-increase {
            background-color: #2ecc71;
        }

        .counter-buttons button:hover {
            opacity: 0.8;
        }

        /* ===== 문제 2: 글자수 세기 ===== */
        #text-input {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 14px;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            resize: vertical;
        }

        .text-stats {
            margin-top: 10px;
            font-size: 16px;
        }

        .text-stats span {
            font-weight: bold;
            margin-right: 20px;
        }

        .warning {
            color: #e74c3c !important;
            font-weight: bold;
        }

        /* ===== 문제 3: 랜덤 색상 ===== */
        #btn-random-color {
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #9b59b6;
            color: white;
            cursor: pointer;
        }

        #btn-random-color:hover {
            opacity: 0.8;
        }

        #current-color {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
        }

        #color-history {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-item {
            width: 80px;
            height: 40px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            border: 1px solid #ddd;
        }

        /* ===== 문제 4: 퀴즈 ===== */
        .quiz-question {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
        }

        .quiz-question h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quiz-option {
            padding: 10px 15px;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .quiz-option:hover {
            background-color: #ecf0f1;
        }

        .quiz-option.correct {
            background-color: #27ae60;
            color: white;
            border-color: #27ae60;
        }

        .quiz-option.wrong {
            background-color: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .quiz-option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        #quiz-result {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Day 05 연습 문제 - DOM &amp; 이벤트</h1>

    <!-- ===== 문제 1: 간단한 카운터 ===== -->
    <div class="exercise">
        <h2>문제 1: 간단한 카운터</h2>
        <div id="counter-display">0</div>
        <div class="counter-buttons">
            <button id="btn-decrease">- 감소</button>
            <button id="btn-reset">리셋</button>
            <button id="btn-increase">+ 증가</button>
        </div>
    </div>

    <!-- ===== 문제 2: 실시간 글자수 세기 ===== -->
    <div class="exercise">
        <h2>문제 2: 실시간 글자수 세기</h2>
        <textarea id="text-input" placeholder="여기에 텍스트를 입력하세요..."></textarea>
        <div class="text-stats">
            <span>글자수: <span id="char-count">0</span></span>
            <span>단어수: <span id="word-count">0</span></span>
        </div>
    </div>

    <!-- ===== 문제 3: 랜덤 색상 생성기 ===== -->
    <div class="exercise" id="color-section">
        <h2>문제 3: 랜덤 색상 생성기</h2>
        <button id="btn-random-color">색상 변경</button>
        <div id="current-color">현재 색상: #F5F5F5</div>
        <p style="margin-bottom: 10px; color: #7f8c8d;">최근 색상 히스토리 (최대 5개):</p>
        <div id="color-history"></div>
    </div>

    <!-- ===== 문제 4: 간단한 퀴즈 앱 ===== -->
    <div class="exercise">
        <h2>문제 4: 간단한 퀴즈 앱</h2>
        <div id="quiz-container">
            <!-- 퀴즈 문제가 JavaScript로 생성됩니다 -->
        </div>
        <div id="quiz-result"></div>
    </div>

    <script src="practice.js"></script>
</body>
</html>
