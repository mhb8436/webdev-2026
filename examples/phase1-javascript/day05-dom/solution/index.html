<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할일 관리 앱</title>
  <style>
    /* 전체 페이지 리셋 및 기본 스타일 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      color: #333;
    }

    /* 앱 컨테이너 */
    .app-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 36px;
      width: 100%;
      max-width: 520px;
      height: fit-content;
    }

    /* 제목 스타일 */
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 28px;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* 입력 영역 스타일 */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    #todo-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #todo-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    #todo-input::placeholder {
      color: #bbb;
    }

    #add-button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      white-space: nowrap;
    }

    #add-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    #add-button:active {
      transform: translateY(0);
    }

    /* 필터 버튼 영역 */
    .filter-area {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
    }

    .filter-button {
      flex: 1;
      padding: 9px 14px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      color: #888;
    }

    .filter-button:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .filter-button.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: white;
    }

    /* 할일 목록 스타일 */
    #todo-list {
      list-style: none;
    }

    #todo-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-bottom: 1px solid #f0f0f0;
      transition: background-color 0.2s, transform 0.15s;
      border-radius: 8px;
    }

    #todo-list li:hover {
      background-color: #fafafe;
      transform: translateX(2px);
    }

    #todo-list li:last-child {
      border-bottom: none;
    }

    /* 체크박스 커스텀 스타일 */
    #todo-list input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      flex-shrink: 0;
    }

    #todo-list input[type="checkbox"]:hover {
      border-color: #667eea;
    }

    #todo-list input[type="checkbox"]:checked {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
    }

    #todo-list input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 6px;
      top: 2px;
      width: 6px;
      height: 11px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    /* 할일 텍스트 스타일 */
    .todo-text {
      flex: 1;
      font-size: 1rem;
      line-height: 1.4;
      transition: all 0.3s;
    }

    .todo-text.done {
      text-decoration: line-through;
      color: #bbb;
    }

    /* 삭제 버튼 스타일 */
    .delete-button {
      padding: 6px 14px;
      background-color: transparent;
      color: #e74c3c;
      border: 2px solid #e74c3c;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0;
      flex-shrink: 0;
    }

    #todo-list li:hover .delete-button {
      opacity: 1;
    }

    .delete-button:hover {
      background-color: #e74c3c;
      color: white;
    }

    /* 빈 상태 메시지 */
    .empty-message {
      text-align: center;
      color: #bbb;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    /* 상태 정보 영역 */
    .status-area {
      text-align: center;
      color: #aaa;
      font-size: 0.88rem;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #f0f0f0;
    }

    /* 반응형 디자인 */
    @media (max-width: 480px) {
      body {
        padding: 20px 10px;
      }

      .app-container {
        padding: 24px 18px;
      }

      h1 {
        font-size: 1.5rem;
      }

      #add-button {
        padding: 12px 16px;
      }

      .delete-button {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <h1>할일 관리 앱</h1>

    <!-- 입력 영역 -->
    <div class="input-area">
      <input type="text" id="todo-input" placeholder="할일을 입력하세요...">
      <button id="add-button">추가</button>
    </div>

    <!-- 필터 버튼 영역 -->
    <div class="filter-area">
      <button class="filter-button active" data-filter="all">전체</button>
      <button class="filter-button" data-filter="active">진행중</button>
      <button class="filter-button" data-filter="completed">완료</button>
    </div>

    <!-- 할일 목록 -->
    <ul id="todo-list"></ul>

    <!-- 상태 정보 -->
    <div class="status-area" id="status"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
